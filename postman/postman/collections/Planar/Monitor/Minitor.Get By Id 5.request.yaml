$kind: http-request
url: http://localhost:2306/monitor/{{monitorId}}
method: GET
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"hook 0 is log\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    pm.expect(jsonData.hooks[0]).to.eql(\"Planar.Log\");\r

      });\r\n"
    language: text/javascript
order: 17000
