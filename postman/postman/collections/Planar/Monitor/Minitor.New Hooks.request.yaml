$kind: http-request
name: Minitor.New Hooks
url: http://localhost:2306/monitor/new-hooks
method: GET
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Result Length greater then 1\", function () {\r

      \    var jsonData = pm.response.json();\r

      \    var value = jsonData[0].replace(\"\\\\\", \"\\\\\\\\\");\r

      \    pm.collectionVariables.set(\"newhook\", value);\r

      \    pm.expect(jsonData.length).to.be.greaterThan(0)\r

      });\r

      \r\n"
    language: text/javascript
order: 25000
