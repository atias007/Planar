$kind: http-request
url: http://localhost:2306/config
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Result is array with values", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("array");
          pm.expect(jsonData.length).to.be.greaterThan(0);
      });

      pm.test("Items have valid config properties", function () {
          var jsonData = pm.response.json();
          jsonData.forEach(function (item) {
              pm.expect(item.key).to.not.be.empty;
              pm.expect(item).to.have.property("value");
              pm.expect(item).to.have.property("type");
              pm.expect(item).to.have.property("lastUpdate");
          });
      });

      pm.test("Contains added config key", function () {
          var jsonData = pm.response.json();
          var keys = jsonData.map(function (item) { return item.key; });
          pm.expect(keys).to.include("PostmanTestConfig");
      });
    language: text/javascript
order: 3000
