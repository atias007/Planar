$kind: http-request
url: http://localhost:2306/trace/count
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Has counter array with 5 levels", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.counter).to.be.an("array");
          pm.expect(jsonData.counter.length).to.equal(5);
          var labels = jsonData.counter.map(function (item) { return item.label; });
          pm.expect(labels).to.include.members(["Fatal", "Error", "Warning", "Information", "Debug"]);
      });

      pm.test("Counter items have non-negative count", function () {
          var jsonData = pm.response.json();
          jsonData.counter.forEach(function (item) {
              pm.expect(item.count).to.be.a("number");
              pm.expect(item.count).to.be.at.least(0);
          });
      });
    language: text/javascript
order: 8000
