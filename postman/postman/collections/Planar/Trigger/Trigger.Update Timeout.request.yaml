$kind: http-request
url: http://localhost:2306/trigger/timeout
method: PATCH
body:
  type: json
  content: |-
    {
        "id": "{{triggerId}}",
        "timeout": "00:30:00"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 204", function () {
          pm.response.to.have.status(204);
      });
    language: text/javascript
order: 6000
