$kind: http-request
url: http://localhost:2306/trigger/paused
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Result is array with values", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("array");
          pm.expect(jsonData.length).to.be.greaterThan(0);
      });

      pm.test("Contains paused trigger with valid properties", function () {
          var jsonData = pm.response.json();
          var triggerId = pm.collectionVariables.get("triggerId");
          var paused = jsonData.filter(function (item) { return item.id === triggerId; });
          pm.expect(paused.length).to.equal(1);
          pm.expect(paused[0].triggerName).to.not.be.empty;
          pm.expect(paused[0].jobId).to.not.be.empty;
          pm.expect(paused[0].jobName).to.equal("BankOfIsraelCurrency");
          pm.expect(paused[0].jobGroup).to.equal("Infrastructure");
      });
    language: text/javascript
order: 10000
