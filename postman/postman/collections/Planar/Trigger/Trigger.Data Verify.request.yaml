$kind: http-request
url: http://localhost:2306/trigger/{{triggerId}}
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Data map contains updated value", function () {
          var jsonData = pm.response.json();
          var trigger = jsonData.simpleTriggers[0];
          pm.expect(trigger.dataMap).to.have.property("PostmanTestKey");
          pm.expect(trigger.dataMap["PostmanTestKey"]).to.equal("PostmanTestValueUpdated");
      });
    language: text/javascript
order: 14000
