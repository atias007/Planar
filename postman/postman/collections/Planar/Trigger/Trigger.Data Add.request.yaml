$kind: http-request
url: http://localhost:2306/trigger/data
method: POST
body:
  type: json
  content: |-
    {
        "id": "{{triggerId}}",
        "dataKey": "PostmanTestKey",
        "dataValue": "PostmanTestValue"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });
    language: text/javascript
order: 12000
