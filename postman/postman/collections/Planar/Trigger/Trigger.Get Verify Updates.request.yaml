$kind: http-request
url: http://localhost:2306/trigger/{{triggerId}}
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Interval was updated", function () {
          var jsonData = pm.response.json();
          var trigger = jsonData.simpleTriggers[0];
          pm.expect(trigger.repeatInterval).to.include("00:12:00");
      });

      pm.test("Timeout was updated", function () {
          var jsonData = pm.response.json();
          var trigger = jsonData.simpleTriggers[0];
          pm.expect(trigger.timeout).to.include("00:30:00");
      });
    language: text/javascript
order: 7000
