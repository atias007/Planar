$kind: http-request
url: http://localhost:2306/history/last
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Total rows greater then 0", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.totalRows).to.be.greaterThan(0);
          pm.expect(jsonData.data).to.be.an("array");
          pm.expect(jsonData.data.length).to.be.greaterThan(0);
      });

      pm.test("First row has valid last run properties", function () {
          var jsonData = pm.response.json();
          var row = jsonData.data[0];
          pm.expect(row.id).to.be.greaterThan(0);
          pm.expect(row.instanceId).to.not.be.empty;
          pm.expect(row.jobId).to.not.be.empty;
          pm.expect(row.jobName).to.not.be.empty;
          pm.expect(row.jobGroup).to.not.be.empty;
          pm.expect(row.triggerId).to.not.be.empty;
          pm.expect(row).to.have.property("status");
          pm.expect(row).to.have.property("statusTitle");
          pm.expect(row).to.have.property("startDate");
      });

      pm.test("Each job appears only once", function () {
          var jsonData = pm.response.json();
          var jobIds = jsonData.data.map(function (row) { return row.jobId; });
          var unique = jobIds.filter(function (value, index, self) { return self.indexOf(value) === index; });
          pm.expect(unique.length).to.equal(jobIds.length);
      });
    language: text/javascript
order: 10000
