$kind: http-request
url: http://localhost:2306/history/summary
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Total rows greater then 0", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.totalRows).to.be.greaterThan(0);
          pm.expect(jsonData.data).to.be.an("array");
          pm.expect(jsonData.data.length).to.be.greaterThan(0);
      });

      pm.test("First row has valid summary properties", function () {
          var jsonData = pm.response.json();
          var row = jsonData.data[0];
          pm.expect(row.jobId).to.not.be.empty;
          pm.expect(row.jobName).to.not.be.empty;
          pm.expect(row.jobGroup).to.not.be.empty;
          pm.expect(row).to.have.property("total");
          pm.expect(row).to.have.property("success");
          pm.expect(row).to.have.property("fail");
          pm.expect(row).to.have.property("running");
          pm.expect(row).to.have.property("retries");
          pm.expect(row).to.have.property("totalEffectedRows");
      });

      pm.test("Total equals sum of statuses", function () {
          var jsonData = pm.response.json();
          jsonData.data.forEach(function (row) {
              pm.expect(row.total).to.be.at.least(row.success + row.fail + row.running);
          });
      });
    language: text/javascript
order: 11000
