$kind: http-request
url: http://localhost:2306/service/calendars
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is an array of strings", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("array");
          jsonData.forEach(function (name) {
              pm.expect(name).to.be.a("string");
          });
      });
    language: text/javascript
order: 5000
