$kind: http-request
url: http://localhost:2306/service/working-hours
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is a non-empty array of calendars", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.be.an("array");
          pm.expect(jsonData.length).to.be.greaterThan(0);
      });

      pm.test("First calendar has valid properties", function () {
          var jsonData = pm.response.json();
          var calendar = jsonData[0];
          pm.expect(calendar.calendarName).to.not.be.empty;
          pm.expect(calendar.days).to.be.an("array");
          pm.expect(calendar.days.length).to.be.greaterThan(0);
      });
    language: text/javascript
order: 6000
