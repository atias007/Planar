$kind: http-request
name: Service.Health Check
url: http://localhost:2306/service/health-check
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.expect(pm.response.code).to.be.equal(200);
      });

      pm.test("Response reports scheduler and database status", function () {
          var body = pm.response.text();
          pm.expect(body).to.include("scheduler: healthy");
          pm.expect(body).to.include("database: healthy");
      });
    language: text/javascript
order: 4000
